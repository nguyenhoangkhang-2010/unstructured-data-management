{% extends 'base.html' %}

{% block content %}
<h2>Create New Candidate</h2>
<hr>
<div class="card modern-card">
    <div class="card-body">
        <form action="{{ url_for('candidate.create_candidate') }}" method="post" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="full_name" class="floating-label">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="modern-input" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="email" class="floating-label">Email</label>
                    <input type="email" id="email" name="email" class="modern-input">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="floating-label">Phone</label>
                    <input type="text" id="phone" name="phone" class="modern-input">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="experience_years" class="floating-label">Experience (Years)</label>
                    <input type="number" id="experience_years" name="experience_years" class="modern-input" value="0">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="skills" class="floating-label">Skills (comma separated)</label>
                    <input type="text" id="skills" name="skills" class="modern-input">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="certificates" class="floating-label">Certificates (comma separated)</label>
                    <input type="text" id="certificates" name="certificates" class="modern-input">
                </div>
                <div class="col-md-12 mb-3">
                    <label for="cv_file" class="floating-label">Upload CV (PDF)</label>
                    <input type="file" id="cv_file" name="cv_file" class="form-control" accept=".pdf">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="cv_image" class="floating-label">CV Image (OCR)</label>
                    <input type="file" id="cv_image" name="cv_image" class="form-control" accept="image/*">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="audio_file" class="floating-label">Interview Audio</label>
                    <input type="file" id="audio_file" name="audio_file" class="form-control" accept="audio/*">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="video_file" class="floating-label">Interview Video</label>
                    <input type="file" id="video_file" name="video_file" class="form-control" accept="video/*">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="linkedin" class="floating-label">LinkedIn URL</label>
                    <input type="url" id="linkedin" name="linkedin" class="modern-input" placeholder="https://linkedin.com/in/...">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="github" class="floating-label">GitHub URL</label>
                    <input type="url" id="github" name="github" class="modern-input" placeholder="https://github.com/...">
                </div>
                <div class="col-md-12 mb-3">
                    <label for="profile_description" class="floating-label">Profile Description</label>
                    <textarea id="profile_description" name="profile_description" class="modern-input" rows="5"></textarea>
                </div>
            </div>
            <button type="submit" class="modern-btn primary-btn">Save Candidate</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const cvInput = document.getElementById('cv_file');
    if (cvInput) {
        cvInput.addEventListener('change', function() {
            if (this.files.length > 0) {
                const formData = new FormData();
                formData.append('cv_file', this.files[0]);
                
                const btn = document.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI is Parsing CV...';
                btn.disabled = true;

                fetch("{{ url_for('candidate.parse_cv') }}", {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        if (!document.getElementById('full_name').value) document.getElementById('full_name').value = data.full_name || '';
                        if (!document.getElementById('email').value) document.getElementById('email').value = data.email || '';
                        if (!document.getElementById('phone').value) document.getElementById('phone').value = data.phone || '';
                        if (!document.getElementById('skills').value) document.getElementById('skills').value = data.skills || '';
                        if (document.getElementById('experience_years').value === '0' || !document.getElementById('experience_years').value) document.getElementById('experience_years').value = data.experience_years || 0;
                        if (!document.getElementById('profile_description').value) document.getElementById('profile_description').value = data.profile_description || '';
                    }
                })
                .catch(error => console.error('Error parsing CV:', error))
                .finally(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                });
            }
        });
    }

    // Auto-fill từ GitHub URL
    const githubInput = document.getElementById('github');
    if (githubInput) {
        githubInput.addEventListener('change', function() {
            const url = this.value;
            if (url && url.includes('github.com')) {
                const btn = document.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Fetching Profile...';
                btn.disabled = true;

                fetch("{{ url_for('candidate.parse_link') }}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ github_url: url })
                })
                .then(response => response.json())
                .then(data => {
                    if (!data.error) {
                        if (data.full_name && !document.getElementById('full_name').value) 
                            document.getElementById('full_name').value = data.full_name;
                        if (data.email && !document.getElementById('email').value) 
                            document.getElementById('email').value = data.email;
                        if (data.skills) {
                            const currentSkills = document.getElementById('skills').value;
                            document.getElementById('skills').value = currentSkills ? currentSkills + ', ' + data.skills : data.skills;
                        }
                    }
                })
                .catch(error => console.error('Error parsing GitHub:', error))
                .finally(() => { btn.innerHTML = originalText; btn.disabled = false; });
            }
        });
    }
});
</script>
{% endblock %}
