{% extends 'base.html' %}
{% block content %}
<h2>Create New Application</h2>
<hr>
<div class="card modern-card">
    <div class="card-body">
        <form action="{{ url_for('application.create_application') }}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="floating-label">Select Candidate</label>
                    <select name="candidate_id" class="modern-input" required>
                        <option value="">-- Choose Candidate --</option>
                        {% for candidate in candidates %}
                        <option value="{{ candidate._id }}">{{ candidate.full_name }} ({{ candidate.email }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="floating-label">Select Job</label>
                    <select name="job_id" class="modern-input" required>
                        <option value="">-- Choose Job --</option>
                        {% for job in jobs %}
                        <option value="{{ job._id }}">{{ job.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="floating-label">Initial Status</label>
                    <select name="status" class="modern-input">
                        <option value="Pending" selected>Pending</option>
                        <option value="Reviewed">Reviewed</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="modern-btn primary-btn"><i class="fas fa-paper-plane"></i> Submit Application</button>
        </form>
    </div>
</div>
{% endblock %}
